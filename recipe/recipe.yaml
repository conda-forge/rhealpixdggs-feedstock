context:
  name: rhealpixdggs
  version: 0.5.13
  python_min: 3.12

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

build:
  noarch: python
  script: 
   - python -m pip install . --no-deps -vv
  number: 0

requirements:
  host:
    - python ==${{ python_min }}
    - poetry-core >=1.0.0
    - wheel
    - pip
  run:
    - python ${{ python_min }}.*
    - numpy >=2.0
    - scipy >=1.11
    - matplotlib-base >=3.7
    - pyproj >=3.6
    - shapely >=2.1

tests:
  - python:
      imports:
        - rhealpixdggs
      pip_check: true
  - script:
      - python -m unittest discover tests/
      - pytest -v --doctest-glob=introduction.rst docs/source/
      - pytest -v --doctest-modules rhealpixdggs -k "not rhealpixdggs.projection_wrapper.Projection"
    requirements:
      run: 
        - pytest
        - python ==${{ python_min }}
    files:
      source:
        - tests/
        - docs/
        - rhealpixdggs/

about:
  homepage: "https://github.com/manaakiwhenua/rhealpixdggs-py"
  repository: "https://github.com/manaakiwhenua/rhealpixdggs-py"
  summary: An implementation of the rHEALPix discrete global grid system
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - alpha-beta-soup
  tags:
    - rhealpix
    - DGGS
    - Discrete Global Grid System
    - geospatial
    - spatial
    - reference system
